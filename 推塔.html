                    }

                    // 绘制英雄
                    if (logic.blueHero.isAlive()) {
                        r.drawUnitCircle(logic.blueHero, 12 * r.scale, true);
                        r.drawAttackFlash(logic.blueHero, 12 * r.scale);
                    }
                    // 复活倒计时
                    if (!logic.blueHero.isAlive() && logic.blueHero.respawnTimer > 0) {
                        r.drawRespawnTimer(logic.blueHero, logic.blueBaseX + 40 * r.scale, logic.laneY - 35 * r.scale);
                    }

                    // 绘制虚拟摇杆
                    const ih = this.inputHandler;
                    if (ih.joystickCenter) {
                        const kx = ih.joystickActive ? ih.joystickRawX : ih.joystickCenter.x;
                        const ky = ih.joystickActive ? ih.joystickRawY : ih.joystickCenter.y;
                        r.drawJoystick(ih.joystickCenter.x, ih.joystickCenter.y,
                            ih.joystickBaseRadius, ih.joystickKnobRadius,
                            kx, ky, ih.joystickActive);
                    }

                    // 绘制攻击按钮
                    if (ih.attackBtnCenter) {
                        r.drawAttackButton(ih.attackBtnCenter.x, ih.attackBtnCenter.y,
                            ih.attackBtnRadius, ih.attackPressed);
                    }

                    // 绘制顶部UI
                    r.drawTopUI(
                        logic.blueTowers, logic.redTowers,
                        logic.blueBase.isAlive(), logic.redBase.isAlive()
                    );

                    // 绘制静音按钮
                    if (this.muteBtnRect) {
                        r.drawMuteButton(this.muteBtnRect.x, this.muteBtnRect.y,
                            this.muteBtnRect.w, this.muted);
                    }

                    // 绘制游戏结束面板
                    if (logic.gameOver) {
                        this.restartBtnRect = r.drawGameOverPanel(logic.victory);
                        this.inputHandler.restartBtnRect = this.restartBtnRect;
                    } else {
                        this.restartBtnRect = null;
                        this.inputHandler.restartBtnRect = null;
                    }
                }

                _restartGame() {
                    this.logic.reset(this.canvas.width, this.canvas.height, this.renderer.scale);
                    this.logic.spawnMinion(Team.BLUE);
                    this.logic.spawnMinion(Team.RED);
                    this.restartBtnRect = null;
                    this.inputHandler.restartBtnRect = null;
                }

                stop() {
                    this.isRunning = false;
                    if (this.animFrameId) {
                        cancelAnimationFrame(this.animFrameId);
                        this.animFrameId = null;
                    }
                }
            }

            // ==================== 八、启动游戏 ====================
            const game = new Game();

            // 页面加载完成后启动
            function initGame() {
                if (game.isLandscape) {
                    game.start();
                } else {
                    // 监听方向变化
                    const checkStart = () => {
                        game._checkOrientation();
                        game._resize();
                        if (game.isLandscape && !game.isRunning) {
                            game.start();
                        }
                    };
                    window.addEventListener('resize', checkStart);
                    window.addEventListener('orientationchange', () => setTimeout(checkStart, 400));
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initGame);
            } else {
                initGame();
            }

            // 页面隐藏时暂停，恢复时继续
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    game.stop();
                } else if (game.isLandscape) {
                    game._checkOrientation();
                    game._resize();
                    game.start();
                }
            });

            console.log('🎮 横版推塔游戏已就绪');
            console.log('  📱 移动端：左下摇杆移动 | 右下按钮攻击');
            console.log('  ⌨️ PC端：WASD/方向键移动 | 空格键攻击');
            console.log('  🔊 右上角按钮切换静音');
            console.log('  📐 请横屏游玩');
        })();
    </script>
</body>
</html>
