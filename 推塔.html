<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>横版推塔·AI英雄版</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:manipulation;position:fixed;top:0;left:0;}
    #gameCanvas{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
    #rotateHint{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;z-index:1000;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;}
    #rotateHint.active{display:flex;}
    #rotateHint .icon{font-size:60px;animation:rot 1.5s infinite;margin-bottom:20px;}
    @keyframes rot{0%,100%{transform:rotate(0deg)}25%,50%{transform:rotate(90deg)}}
    #rotateHint p{color:#fff;font-size:18px;}

    #auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}
    .auth-container{width:90%;max-width:400px;padding:30px 20px;background:rgba(20,20,50,0.9);border:1px solid rgba(255,255,255,0.15);border-radius:16px;text-align:center;backdrop-filter:blur(10px);}
    .auth-title{color:#fff;font-size:22px;font-weight:bold;margin-bottom:25px;letter-spacing:2px;}
    .auth-input{width:100%;padding:12px 15px;font-size:16px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(0,0,0,0.4);color:#fff;outline:none;margin-bottom:15px;}
    .auth-input::placeholder{color:rgba(255,255,255,0.4);}
    .auth-btn{width:100%;padding:12px 0;font-size:18px;font-weight:bold;color:#fff;background:#3366cc;border:none;border-radius:8px;cursor:pointer;transition:background 0.2s;}
    .auth-btn:active{background:#1a3a7a;}
    .auth-error{color:#ff6666;font-size:14px;margin-top:12px;min-height:18px;}
    @media(max-width:600px){.auth-container{padding:25px 18px;}.auth-title{font-size:20px;}.auth-input{font-size:15px;}.auth-btn{font-size:16px;}}

    .floating-watermark {
      position: fixed; pointer-events: none; z-index: 500; font-size: 14px; line-height: 1.5;
      color: rgba(180,180,180,0.25); text-align: center; white-space: nowrap; will-change: left, top;
    }
    @media(max-width:600px){.floating-watermark{font-size:10px;}}
  </style>
</head>
<body>
  <div id="rotateHint"><div class="icon">📱</div><p>请横屏游玩</p></div>
  <canvas id="gameCanvas"></canvas>

  <div id="auth-overlay">
    <div class="auth-container">
      <div class="auth-title">游戏授权验证</div>
      <input type="text" id="auth-account" class="auth-input" placeholder="请输入账号" maxlength="20" autocomplete="off">
      <input type="password" id="auth-password" class="auth-input" placeholder="请输入密码" maxlength="20" autocomplete="off">
      <button id="auth-btn" class="auth-btn">确认进入</button>
      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <!-- ==================== 游戏主逻辑（完全保留） ==================== -->
  <script>
    (function() {
      const CONFIG = {
        HERO_HP: 600, HERO_ATK: 50, HERO_SPD: 280, HERO_RANGE: 90, HERO_RESPAWN: 5,
        MINION_HP: 300, MINION_ATK: 35, MINION_SPD: 150, MINION_RANGE: 55, MINION_INTERVAL: 5,
        TOWER_HP: 2000, TOWER_ATK: 150, TOWER_RANGE: 160,
        BASE_HP: 2400,
        DIFFICULTY: { easy: { hpMul:0.35, atkMul:0.35 }, normal: { hpMul:1, atkMul:1 }, hard: { hpMul:2.0, atkMul:1.8 } },
        SKILL_COOLDOWN: 8, DASH_DISTANCE: 130,
        CRYSTAL_BOOST_COST: 5, CRYSTAL_BOOST_ATK_MUL: 1.6, CRYSTAL_BOOST_DURATION: 5,
        JOYSTICK_BASE: 0.14, JOYSTICK_KNOB: 0.06, ATK_BTN: 0.10, JOY_MARGIN: 0.08, ATK_MARGIN: 0.08,
        ENEMY_DAMAGE_TO_HERO_MUL: 2.5
      };

      const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || window.innerWidth < 800;

      class AudioManager {
        constructor() { this.ctx = null; this.muted = false; this.ready = false; this.bgMusicGain = null; this.bgMusicActive = false; }
        init() { if(this.ready) return; try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.ready = true; } catch(e){} }
        play(freq, dur, type='square', vol=0.2, glide=null) {
          if(!this.ready || this.muted || !this.ctx) return;
          const t = this.ctx.currentTime, osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
          osc.type = type; osc.frequency.setValueAtTime(freq, t);
          if(glide) osc.frequency.linearRampToValueAtTime(glide, t+dur);
          gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
          osc.connect(gain); gain.connect(this.ctx.destination); osc.start(t); osc.stop(t+dur);
        }
        attack() { this.play(900,0.07,'square',0.2); setTimeout(()=>this.play(1100,0.05,'square',0.15),30); }
        hit() { this.play(180,0.1,'triangle',0.3); }
        towerDown() { this.play(60,0.5,'sawtooth',0.4,25); this.play(40,0.6,'triangle',0.35,15); }
        victory() { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.play(f,0.2,'square',0.22),i*120)); }
        defeat() { [880,698,523,349,220].forEach((f,i)=>setTimeout(()=>this.play(f,0.25,'triangle',0.25),i*140)); }
        toggle() { this.muted = !this.muted; if(this.bgMusicGain) this.bgMusicGain.gain.value = this.muted ? 0 : 0.15; return this.muted; }
        startBGM() {
          if(!this.ready || !this.ctx) return;
          if(this.bgMusicActive) return;
          this.bgMusicActive = true;
          const ctx = this.ctx, gain = ctx.createGain();
          gain.gain.value = this.muted ? 0 : 0.15;
          gain.connect(ctx.destination);
          this.bgMusicGain = gain;
          const notes = [130.81, 164.81, 196.00, 220.00];
          let noteIndex = 0, nextNoteTime = ctx.currentTime;
          const beat = 60 / 60;
          const scheduler = () => {
            while (nextNoteTime < ctx.currentTime + 0.1) {
              const osc = ctx.createOscillator();
              osc.type = 'sine'; osc.frequency.setValueAtTime(notes[noteIndex % notes.length], nextNoteTime);
              const g = ctx.createGain();
              g.gain.setValueAtTime(0.08, nextNoteTime);
              g.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + beat * 0.9);
              osc.connect(g); g.connect(gain);
              osc.start(nextNoteTime); osc.stop(nextNoteTime + beat * 0.9);
              nextNoteTime += beat; noteIndex++;
            }
            if(this.bgMusicActive) requestAnimationFrame(scheduler);
          };
          scheduler();
        }
        stopBGM() { this.bgMusicActive = false; if(this.bgMusicGain) { this.bgMusicGain.disconnect(); this.bgMusicGain = null; } }
      }

      const Team = Object.freeze({ BLUE:'blue', RED:'red' });

      class Unit {
        constructor(x,y,team,maxHp,atk,atkSpeed,range) {
          this.x=x; this.y=y; this.team=team; this.maxHp=maxHp; this.hp=maxHp; this.displayHp=maxHp;
          this.atk=atk; this.atkSpeed=atkSpeed; this.range=range; this.atkCooldown=0; this.alive=true; this.flashTimer=0;
          this.facingRight = team===Team.BLUE;
        }
        takeDamage(dmg) { if(!this.alive) return; this.hp -= dmg; this.flashTimer = 0.12; if(this.hp <= 0) { this.hp=0; this.alive=false; this.onDeath(); } }
        onDeath(){}
        canAttack(){ return this.alive && this.atkCooldown<=0; }
        performAttack(){ this.atkCooldown = this.atkSpeed; }
        distanceTo(o){ const dx=this.x-o.x, dy=this.y-o.y; return Math.sqrt(dx*dx+dy*dy); }
        inRange(o){ return this.distanceTo(o) <= this.range; }
        updateCooldown(dt){ if(this.atkCooldown>0) this.atkCooldown-=dt; if(this.flashTimer>0) this.flashTimer-=dt; }
        hpRatio(){ return Math.max(0, this.hp/this.maxHp); }
        updateDisplayHp(dt){ this.displayHp += (this.hp - this.displayHp) * Math.min(10*dt, 1); }
        selectTarget(enemies) {
          const inRange = enemies.filter(e => e.alive && this.inRange(e));
          const minions = inRange.filter(e => e instanceof Minion);
          if(minions.length > 0) return minions.reduce((a,b) => this.distanceTo(a) < this.distanceTo(b) ? a : b);
          const towers = inRange.filter(e => e instanceof Tower);
          if(towers.length > 0) return towers.reduce((a,b) => this.distanceTo(a) < this.distanceTo(b) ? a : b);
          const crystals = inRange.filter(e => e instanceof BaseCrystal);
          if(crystals.length > 0) return crystals[0];
          return null;
        }
      }

      class Hero extends Unit {
        constructor(x,y,team,isPlayer=true) {
          super(x,y,team,CONFIG.HERO_HP,CONFIG.HERO_ATK,0.7,CONFIG.HERO_RANGE);
          this.moveSpeed=CONFIG.HERO_SPD; this.isPlayer=isPlayer; this.vx=0; this.vy=0; this.spawnX=x; this.spawnY=y;
          this.respawnTimer=0; this.crystal=0; this.boostTimer=0; this.boostActive=false; this.kills=0; this.towersDestroyed=0;
        }
        setMovement(vx,vy) { const mag = Math.sqrt(vx*vx+vy*vy); if(mag>1){ vx/=mag; vy/=mag; } this.vx = vx * this.moveSpeed; this.vy = vy * this.moveSpeed; if(vx!==0) this.facingRight = vx>0; }
        stopMovement(){ this.vx=0; this.vy=0; }
        updatePosition(dt, minX,maxX,minY,maxY) { if(!this.alive) return; this.x += this.vx * dt; this.y += this.vy * dt; this.x = Math.max(minX, Math.min(maxX, this.x)); this.y = Math.max(minY, Math.min(maxY, this.y)); }
        respawn() { this.alive=true; this.hp=this.maxHp; this.displayHp=this.maxHp; this.x=this.spawnX; this.y=this.spawnY; this.respawnTimer=0; this.atkCooldown=0; this.flashTimer=0; this.vx=0; this.vy=0; }
        onDeath() { if(this.isPlayer) this.respawnTimer=CONFIG.HERO_RESPAWN; this.stopMovement(); }
        updateRespawn(dt) { if(!this.alive && this.respawnTimer>0) { this.respawnTimer-=dt; if(this.respawnTimer<=0) this.respawn(); } }
        getEffectiveAtk() { return this.boostActive ? this.atk * CONFIG.CRYSTAL_BOOST_ATK_MUL : this.atk; }
        updateBoost(dt) { if(this.boostTimer>0) { this.boostTimer-=dt; if(this.boostTimer<=0) this.boostActive=false; } }
        activateBoost() { if(this.crystal < CONFIG.CRYSTAL_BOOST_COST || this.boostActive) return false; this.crystal -= CONFIG.CRYSTAL_BOOST_COST; this.boostActive = true; this.boostTimer = CONFIG.CRYSTAL_BOOST_DURATION; return true; }
      }

      class Minion extends Unit {
        constructor(x,y,team,targetX) { super(x,y,team,CONFIG.MINION_HP,CONFIG.MINION_ATK,1.2,CONFIG.MINION_RANGE); this.moveSpeed=CONFIG.MINION_SPD; this.targetX=targetX; this.currentTarget=null; this.facingRight = team===Team.BLUE; }
        findTarget(enemies) { this.currentTarget = this.selectTarget(enemies); return this.currentTarget; }
        updateMovement(dt, minX, maxX) { if(!this.alive) return; if(this.currentTarget && this.currentTarget.alive && this.inRange(this.currentTarget)) return; this.currentTarget = null; const dir = this.team===Team.BLUE ? 1 : -1; this.x += dir * this.moveSpeed * dt; this.facingRight = dir>0; this.x = Math.max(minX, Math.min(maxX, this.x)); }
      }

      class Tower extends Unit {
        constructor(x,y,team) { super(x,y,team,CONFIG.TOWER_HP,CONFIG.TOWER_ATK,1.0,CONFIG.TOWER_RANGE); this.currentTarget=null; this.attackGlow=0; }
        findTarget(enemies) { this.currentTarget = this.selectTarget(enemies); return this.currentTarget; }
        updateGlow(dt){ if(this.attackGlow>0) this.attackGlow-=dt; }
        performAttack(){ super.performAttack(); this.attackGlow=0.2; }
      }

      class BaseCrystal extends Unit {
        constructor(x,y,team) { super(x,y,team,CONFIG.BASE_HP,0,999,0); this.glowPhase=Math.random()*Math.PI*2; }
        updateGlow(dt){ this.glowPhase+=dt*2.5; if(this.glowPhase>Math.PI*2) this.glowPhase-=Math.PI*2; }
        canAttack(){ return false; }
      }

      class Projectile {
        constructor(fromX,fromY,toX,toY,color,dmg,target,attackerType) {
          this.startX=fromX; this.startY=fromY; this.toX=toX; this.toY=toY; this.x=fromX; this.y=fromY;
          this.color=color; this.dmg=dmg; this.target=target; this.attackerType=attackerType;
          this.progress=0; this.duration=0.12; this.elapsed=0; this.done=false;
        }
        update(dt) { if(this.done) return; this.elapsed+=dt; this.progress=Math.min(1, this.elapsed/this.duration); const t=this.progress; this.x = this.startX + (this.toX - this.startX)*t; this.y = this.startY + (this.toY - this.startY)*t; if(this.progress>=1) this.done=true; }
      }

      class Particle {
        constructor(x,y,vx,vy,life,color,size) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life; this.color=color; this.size=size; }
        update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; this.life-=dt; }
        alive() { return this.life>0; }
      }

      class InputHandler {
        constructor(canvas) {
          this.canvas = canvas;
          this.joystick = { active:false, id:null, dx:0, dy:0, rawX:0, rawY:0, baseRadius:60, knobRadius:30, center:{x:0,y:0} };
          this.attackBtn = { pressed:false, id:null, center:{x:0,y:0}, radius:50 };
          this.skillBtn = { pressed:false, id:null, center:{x:0,y:0}, radius:50 };
          this.keys = {}; this.keyAttack = false; this.keySkill = false;
          this._bind();
        }
        _bind() {
          const c = this.canvas;
          c.addEventListener('touchstart', e => this._touchStart(e), { passive: false });
          c.addEventListener('touchmove', e => this._touchMove(e), { passive: false });
          c.addEventListener('touchend', e => this._touchEnd(e));
          c.addEventListener('mousedown', e => this._mouseDown(e));
          c.addEventListener('mousemove', e => this._mouseMove(e));
          c.addEventListener('mouseup', e => this._mouseUp(e));
          window.addEventListener('keydown', e => this._keyDown(e));
          window.addEventListener('keyup', e => this._keyUp(e));
        }
        _canvasPos(clientX, clientY) { const rect = this.canvas.getBoundingClientRect(); return { x:(clientX - rect.left)*(this.canvas.width/rect.width), y:(clientY - rect.top)*(this.canvas.height/rect.height) }; }
        _inCircle(px, py, cx, cy, r) { return (px-cx)**2+(py-cy)**2 <= r*r; }
        _inRect(px, py, rect) { return rect && px>=rect.x && px<=rect.x+rect.w && py>=rect.y && py<=rect.y+rect.h; }
        _touchStart(e) {
          e.preventDefault();
          if(!this.joystick.center || !this.attackBtn.center) return;
          for(const t of e.changedTouches) {
            const p = this._canvasPos(t.clientX, t.clientY);
            if(!this.joystick.id && this._inCircle(p.x,p.y,this.joystick.center.x,this.joystick.center.y,this.joystick.baseRadius*1.6)) { this.joystick.id=t.identifier; this.joystick.active=true; this._updateJoystick(p.x,p.y); }
            else if(!this.attackBtn.id && this._inCircle(p.x,p.y,this.attackBtn.center.x,this.attackBtn.center.y,this.attackBtn.radius*1.5)) { this.attackBtn.id=t.identifier; this.attackBtn.pressed=true; }
            else if(!this.skillBtn.id && this._inCircle(p.x,p.y,this.skillBtn.center.x,this.skillBtn.center.y,this.skillBtn.radius*1.5)) { this.skillBtn.id=t.identifier; this.skillBtn.pressed=true; }
          }
        }
        _touchMove(e) { e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===this.joystick.id) { const p=this._canvasPos(t.clientX,t.clientY); this._updateJoystick(p.x,p.y); } }
        _touchEnd(e) { e.preventDefault(); for(const t of e.changedTouches) { if(t.identifier===this.joystick.id){ this.joystick.id=null; this.joystick.active=false; this.joystick.dx=0; this.joystick.dy=0; } if(t.identifier===this.attackBtn.id){ this.attackBtn.id=null; this.attackBtn.pressed=false; } if(t.identifier===this.skillBtn.id){ this.skillBtn.id=null; this.skillBtn.pressed=false; } } }
        _updateJoystick(px,py) { const cx=this.joystick.center.x, cy=this.joystick.center.y, maxR=this.joystick.baseRadius-this.joystick.knobRadius; let dx=px-cx, dy=py-cy; const dist=Math.sqrt(dx*dx+dy*dy); if(dist>maxR){ dx=dx/dist*maxR; dy=dy/dist*maxR; } this.joystick.rawX=cx+dx; this.joystick.rawY=cy+dy; this.joystick.dx=dx/maxR; this.joystick.dy=dy/maxR; }
        _mouseDown(e) { if(e.button!==0) return; const p=this._canvasPos(e.clientX,e.clientY); if(this._inCircle(p.x,p.y,this.joystick.center.x,this.joystick.center.y,this.joystick.baseRadius*1.6)){ this.joystick.active=true; this.joystick.id='mouse'; this._updateJoystick(p.x,p.y); } if(this._inCircle(p.x,p.y,this.attackBtn.center.x,this.attackBtn.center.y,this.attackBtn.radius*1.5)) this.attackBtn.pressed=true; if(this._inCircle(p.x,p.y,this.skillBtn.center.x,this.skillBtn.center.y,this.skillBtn.radius*1.5)) this.skillBtn.pressed=true; }
        _mouseMove(e) { if(this.joystick.id==='mouse') this._updateJoystick(this._canvasPos(e.clientX,e.clientY).x, this._canvasPos(e.clientX,e.clientY).y); }
        _mouseUp(e) { this.joystick.id=null; this.joystick.active=false; this.joystick.dx=0; this.joystick.dy=0; this.attackBtn.pressed=false; this.skillBtn.pressed=false; }
        _keyDown(e) {
          this.keys[e.key]=true;
          if(e.key===' '||e.key==='Spacebar'){ this.keyAttack=true; e.preventDefault(); }
          if(e.key==='e'||e.key==='E'){ this.keySkill=true; e.preventDefault(); }
          if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
        }
        _keyUp(e) { this.keys[e.key]=false; if(e.key===' '||e.key==='Spacebar') this.keyAttack=false; if(e.key==='e'||e.key==='E') this.keySkill=false; }
        getMovement() { let vx=0,vy=0; if(this.joystick.active){ vx=this.joystick.dx; vy=this.joystick.dy; } if(this.keys['w']||this.keys['ArrowUp']) vy=-1; if(this.keys['s']||this.keys['ArrowDown']) vy=1; if(this.keys['a']||this.keys['ArrowLeft']) vx=-1; if(this.keys['d']||this.keys['ArrowRight']) vx=1; return {vx,vy}; }
        isAttack() { const v = this.attackBtn.pressed || this.keyAttack; this.keyAttack = false; return v; }
        isSkill() { const v = this.skillBtn.pressed || this.keySkill; this.keySkill = false; return v; }
      }

      class Renderer {
        constructor(canvas,ctx) { this.canvas=canvas; this.ctx=ctx; this.w=0; this.h=0; this.scale=1; }
        resize(w,h) { this.w=w; this.h=h; this.scale=Math.min(w/1200, h/500, 1.5); }
        clear() { this.ctx.clearRect(0,0,this.w,this.h); }
        drawMap(laneY) {
          const ctx=this.ctx, w=this.w, h=this.h;
          const grad=ctx.createLinearGradient(0,0,0,h); grad.addColorStop(0,'#1a1a3e'); grad.addColorStop(0.4,'#2d3a6e'); grad.addColorStop(0.6,'#4a6fa5'); grad.addColorStop(1,'#1a2a1a');
          ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
          ctx.fillStyle='rgba(30,60,140,0.3)'; ctx.fillRect(0,0,w*0.5,h); ctx.fillStyle='rgba(180,30,30,0.2)'; ctx.fillRect(w*0.5,0,w*0.5,h);
          const groundY=laneY+45*this.scale; ctx.fillStyle='#3d5a3d'; ctx.fillRect(0,groundY,w,h-groundY); ctx.fillStyle='#4a7040'; ctx.fillRect(0,groundY,w,6*this.scale);
          ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=2*this.scale; ctx.setLineDash([15*this.scale,10*this.scale]); ctx.beginPath(); ctx.moveTo(30,laneY); ctx.lineTo(w-30,laneY); ctx.stroke(); ctx.setLineDash([]);

          ctx.save();
          ctx.font = `${12*this.scale}px "PingFang SC","Microsoft YaHei",sans-serif`;
          ctx.fillStyle = 'rgba(200,200,200,0.15)';
          ctx.textAlign = 'left';
          ctx.fillText('to: aespa', 20, laneY - 50*this.scale);
          ctx.font = `${11*this.scale}px "PingFang SC","Microsoft YaHei",sans-serif`;
          ctx.fillText('   *旷野的规则是永不回头', 20, laneY - 30*this.scale);
          ctx.fillText('                   I just hope you get betterand better', 20, laneY + 80*this.scale);
          ctx.restore();
        }
        drawHpBar(x,y,w,ratio,team) { const ctx=this.ctx, h=4*this.scale, bx=x-w/2, by=y; ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bx-1,by-1,w+2,h+2); ctx.fillStyle='#444'; ctx.fillRect(bx,by,w,h); const hpW=w*ratio, color=ratio>0.5?'#44dd44':ratio>0.25?'#dddd44':'#dd4444'; ctx.fillStyle=color; ctx.fillRect(bx,by,hpW,h); ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(bx,by,hpW,h*0.4); }
        drawUnitCircle(unit, radius, hasArrow=false) {
          const ctx=this.ctx, x=unit.x, y=unit.y, r=radius, baseColor=unit.team===Team.BLUE?'#4488ff':'#ff4444'; let body=baseColor; if(unit.flashTimer>0) body='#ff8888';

      class GameLogic {

          this.blueBase = new BaseCrystal(this.blueBaseX, this.laneY, Team.BLUE);

      }

      class Game {
        constructor() {
          this.canvas = document.getElementById('gameCanvas'); this.ctx = this.canvas.getContext('2d');
          this.audio = new AudioManager(); this.input = new InputHandler(this.canvas);
          this.renderer = new Renderer(this.canvas, this.ctx);
          this.state = 'menu'; this.logic = null; this.difficulty = 'normal'; this.menuSelection = 0;
          this.lastTime = 0; this.raf = null;
          this.returnRect = null; this.pauseRect = null; this.restartRect = null; this.muteRect = null; this.guideTimer = 0;
          this._bindEvents(); this._checkOrientation(); this._resize();
        }
        _bindEvents() {
          window.addEventListener('resize', () => { this._checkOrientation(); this._resize(); });
          window.addEventListener('orientationchange', () => setTimeout(() => { this._checkOrientation(); this._resize(); }, 300));
          const initAudio = () => { this.audio.init(); document.removeEventListener('touchstart', initAudio); document.removeEventListener('click', initAudio); };
          document.addEventListener('touchstart', initAudio, { once: false }); document.addEventListener('click', initAudio, { once: false });
          document.addEventListener('keydown', e => {
            if(this.state === 'menu') { if(e.key === 'ArrowDown') this.menuSelection = (this.menuSelection+1)%3; if(e.key === 'ArrowUp') this.menuSelection = (this.menuSelection+2)%3; if(e.key === 'Enter') this._startGame(); }

        _checkOrientation() { const w = window.innerWidth, h = window.innerHeight; document.getElementById('rotateHint').classList.toggle('active', w < h); }

          this.canvas.width = Math.floor(window.innerWidth * dpr); this.canvas.height = Math.floor(window.innerHeight * dpr);

          if(this.logic) { this.logic.w = this.canvas.width; this.logic.h = this.canvas.height; this.logic.scale = this.renderer.scale; this.logic.laneY = this.canvas.height * 0.56; this.logic.mapMinX = 15; this.logic.mapMaxX = this.canvas.width - 15; }
        }
        _updateUI() {
          const w = this.canvas.width, h = this.canvas.height, s = this.renderer.scale;
          if(isMobile) {
            const joyR = CONFIG.JOYSTICK_BASE * h, knobR = CONFIG.JOYSTICK_KNOB * h;

            const skillR = atkR * 0.9;

            this.input.skillBtn.radius = skillR;
          }
          this.returnRect = { x:5*s, y:35*s, w:40*s, h:35*s };
          this.restartRect = { x:50*s, y:35*s, w:40*s, h:35*s };
          this.muteRect = { x:w/2-20*s, y:35*s, w:35*s, h:35*s };
          this.pauseRect = { x:w-50*s, y:35*s, w:40*s, h:35*s };
        }
        _startGame() {
          this.state = 'playing'; this.guideTimer = 3;
          this.logic = new GameLogic(this.canvas.width, this.canvas.height, this.renderer.scale, this.difficulty);
          this.logic.spawnMinion(Team.BLUE); this.logic.spawnMinion(Team.RED);
          this.audio.init();
          this.audio.startBGM();
        }
        _restart() { this.audio.stopBGM(); this._startGame(); }
        run(timestamp) {
          if(this.state !== 'menu' && this.state !== 'paused') {
            const dt = Math.min((timestamp - this.lastTime)/1000, 0.1);
            this.lastTime = timestamp;
            if(this.state === 'playing') this.logic.update(dt, this.input, this.audio);
            if(this.state === 'playing' && this.logic.gameOver) {
              this.state = 'over';
              this.audio.stopBGM();
            }
            this.guideTimer = Math.max(0, this.guideTimer - dt);
          } else { this.lastTime = timestamp; }
          this._render();
          this.raf = requestAnimationFrame(t => this.run(t));
        }
        _render() {
          const r = this.renderer, ctx = this.ctx; r.clear();
          if(this.state === 'menu') { r.drawMenu('横版推塔', ['开始游戏 (简单)', '开始游戏 (普通)', '开始游戏 (困难)'], this.menuSelection); return; }
          if(!this.logic) return;
          r.drawMap(this.logic.laneY);
          r.drawBase(this.logic.blueBase, 30*r.scale); r.drawBase(this.logic.redBase, 30*r.scale);
          for(const t of this.logic.blueTowers) if(t.alive) r.drawTower(t, 38*r.scale);
          for(const t of this.logic.redTowers) if(t.alive) r.drawTower(t, 38*r.scale);
          for(const p of this.logic.projectiles) r.drawProjectile(p);
          for(const m of this.logic.blueMinions) r.drawUnitCircle(m, 10*r.scale);
          for(const m of this.logic.redMinions) r.drawUnitCircle(m, 10*r.scale);
          if(this.logic.hero.alive) r.drawUnitCircle(this.logic.hero, 16*r.scale, true);
          else if(this.logic.hero.respawnTimer > 0) { ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.font=`bold ${16*r.scale}px sans-serif`; ctx.textAlign='center'; ctx.fillText(`复活:${Math.ceil(this.logic.hero.respawnTimer)}秒`, this.logic.hero.spawnX, this.logic.hero.spawnY-30*r.scale); }
          if(this.logic.redHero && this.logic.redHero.alive) r.drawUnitCircle(this.logic.redHero, 16*r.scale, true);
          for(const p of this.logic.particles) r.drawParticle(p);
          if(this.guideTimer > 0) {
            const text = isMobile ? '左侧摇杆 | 右侧攻击/冲刺' : 'WASD移动 | 空格攻击 | E冲刺';
            ctx.font = `bold ${14*r.scale}px sans-serif`;
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,this.canvas.width,40*r.scale); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(text, this.canvas.width/2, 25*r.scale);
          }
          if(isMobile) {
            const ih = this.input;
            if(ih.joystick.center) { const kx = ih.joystick.active?ih.joystick.rawX:ih.joystick.center.x, ky = ih.joystick.active?ih.joystick.rawY:ih.joystick.center.y; r.drawJoystick(ih.joystick.center.x, ih.joystick.center.y, ih.joystick.baseRadius, ih.joystick.knobRadius, kx, ky, ih.joystick.active); }
            if(ih.attackBtn.center) r.drawAtkBtn(ih.attackBtn.center.x, ih.attackBtn.center.y, ih.attackBtn.radius, ih.attackBtn.pressed);
            if(ih.skillBtn.center) { const cd = this.logic.hero.skillCooldown / CONFIG.SKILL_COOLDOWN; r.drawSkillBtn(ih.skillBtn.center.x, ih.skillBtn.center.y, ih.skillBtn.radius, ih.skillBtn.pressed, cd); }
          }
          r.drawTopUI(this.logic.blueTowers, this.logic.redTowers, this.logic.hero);
          if(this.returnRect) { ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(this.returnRect.x,this.returnRect.y,this.returnRect.w,this.returnRect.h,6); ctx.fill(); ctx.fillStyle='#fff'; ctx.font=`${this.returnRect.h*0.6}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🏠', this.returnRect.x+this.returnRect.w/2, this.returnRect.y+this.returnRect.h/2); }
          if(this.restartRect) { ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(this.restartRect.x,this.restartRect.y,this.restartRect.w,this.restartRect.h,6); ctx.fill(); ctx.fillStyle='#fff'; ctx.font=`${this.restartRect.h*0.6}px sans-serif`; ctx.fillText('🔄', this.restartRect.x+this.restartRect.w/2, this.restartRect.y+this.restartRect.h/2); }
          if(this.pauseRect) { ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(this.pauseRect.x,this.pauseRect.y,this.pauseRect.w,this.pauseRect.h,6); ctx.fill(); ctx.fillStyle='#fff'; ctx.font=`${this.pauseRect.h*0.6}px sans-serif`; ctx.fillText(this.state==='paused'?'▶️':'⏸️', this.pauseRect.x+this.pauseRect.w/2, this.pauseRect.y+this.pauseRect.h/2); }
          if(this.muteRect) { ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(this.muteRect.x,this.muteRect.y,this.muteRect.w,this.muteRect.h,6); ctx.fill(); ctx.fillStyle='#fff'; ctx.font=`${this.muteRect.h*0.6}px sans-serif`; ctx.fillText(this.audio.muted?'🔇':'🔊', this.muteRect.x+this.muteRect.w/2, this.muteRect.y+this.muteRect.h/2); }
          if(this.state==='over') { const stats={kills:this.logic.hero.kills, towers:this.logic.hero.towersDestroyed, time:Math.floor(this.logic.time)}; this.restartBtnRect = r.drawGameOver(this.logic.victory, stats); }
        }
        start() { if(this.raf) cancelAnimationFrame(this.raf); this.lastTime=performance.now(); this.raf=requestAnimationFrame(t=>this.run(t)); }
      }

      const game = new Game();

      function handleCanvasClick(pos) {
        if(game.state === 'menu') {
          const yOff = game.canvas.height * 0.45;
          for(let i=0; i<3; i++) {
            const y = yOff + i*50*game.renderer.scale;
            if(pos.y > y-25 && pos.y < y+25) {
              game.menuSelection = i;
              game.difficulty = ['easy','normal','hard'][i];
              game._startGame();
              break;
            }
          }
        } else if(game.state === 'over' && game.restartBtnRect && game.input._inRect(pos.x, pos.y, game.restartBtnRect)) { game._restart(); }
        else if(game.returnRect && game.input._inRect(pos.x, pos.y, game.returnRect)) { game.state='menu'; game.logic=null; game.audio.stopBGM(); }
        else if(game.pauseRect && game.input._inRect(pos.x, pos.y, game.pauseRect)) { if(game.state==='playing') game.state='paused'; else if(game.state==='paused') game.state='playing'; }
        else if(game.restartRect && game.state==='playing' && game.input._inRect(pos.x, pos.y, game.restartRect)) { game._restart(); }
        else if(game.muteRect && game.input._inRect(pos.x, pos.y, game.muteRect)) { game.audio.toggle(); }
      }

      game.canvas.addEventListener('click', (e) => { const pos = game.input._canvasPos(e.clientX, e.clientY); handleCanvasClick(pos); });
      game.canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.changedTouches[0]; if(!touch) return; const pos = game.input._canvasPos(touch.clientX, touch.clientY); handleCanvasClick(pos); }, { passive: false });

      window.startGame = function() { document.getElementById('gameCanvas').style.display = 'block'; game.start(); };
    })();
  </script>

  <!-- 动态漂浮水印 -->
  <script>
    (function() {
      const div = document.createElement('div');
      div.className = 'floating-watermark';
      div.innerHTML = '测试阶段，并非最终效果，严谨盗用<br>https://kl520love.github.io/KLYOTVXEL//推塔.html<br>原作者：谭熙林';
      document.body.appendChild(div);
      let x = Math.random() * (window.innerWidth - 200), y = Math.random() * (window.innerHeight - 60);
      let vx = 0.5, vy = 0.4;
      if(Math.random() < 0.5) vx *= -1;
      if(Math.random() < 0.5) vy *= -1;
      function step() {
        x += vx; y += vy;
        const maxX = window.innerWidth - div.offsetWidth, maxY = window.innerHeight - div.offsetHeight;
        if(x <= 0 || x >= maxX) vx *= -1;
        if(y <= 0 || y >= maxY) vy *= -1;
        x = Math.max(0, Math.min(maxX, x)); y = Math.max(0, Math.min(maxY, y));
        div.style.left = x + 'px'; div.style.top = y + 'px';
        requestAnimationFrame(step);
      }
      step();
    })();
  </script>

  <!-- 账号密码验证模块 -->
  <script>
    (function() {
      const authOverlay = document.getElementById('auth-overlay');
      const accountInput = document.getElementById('auth-account');
      const passwordInput = document.getElementById('auth-password');
      const authBtn = document.getElementById('auth-btn');
      const authError = document.getElementById('auth-error');

      function verify() {
        const rawAccount = accountInput.value.trim();
        const accountKey = rawAccount.toLowerCase();
        const password = passwordInput.value.trim();

        if (ACCOUNT_PASSWORDS.hasOwnProperty(accountKey) && ACCOUNT_PASSWORDS[accountKey] === password) {
          authOverlay.style.display = 'none';
          if (typeof window.startGame === 'function') window.startGame();
          else console.error('游戏启动函数未找到');
        } else {
          authError.textContent = '账号或密码错误';
          accountInput.value = '';
          passwordInput.value = '';
          accountInput.focus();
        }
      }

      authBtn.addEventListener('click', verify);
      passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') verify(); });
      accountInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordInput.focus(); });
      window.addEventListener('load', () => { if (accountInput) accountInput.focus(); });
    })();
  </script>
